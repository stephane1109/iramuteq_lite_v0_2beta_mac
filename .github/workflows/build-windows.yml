name: Build Windows App

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-windows.yml"
      - "tauri-ui/**"
      - "backend/**"
      - "dictionnaires/**"
      - "help/**"
      - "images/**"
      - "iramuteqlite/**"
      - "lda/**"

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "tauri-ui/package-lock.json"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: tauri-ui
        run: npm ci

      - name: Build Windows NSIS bundle
        working-directory: tauri-ui
        run: npm run build -- --bundles nsis

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: iramuteq-lite-windows-nsis
          path: |
            tauri-ui/src-tauri/target/release/bundle/nsis/*.exe
            tauri-ui/src-tauri/target/release/bundle/nsis/*.msi
          if-no-files-found: error
          retention-days: 14
