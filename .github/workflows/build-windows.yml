name: Build Windows App

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-windows.yml"
      - "tauri-ui/**"
      - "backend/**"
      - "dictionnaires/**"
      - "help/**"
      - "images/**"
      - "iramuteqlite/**"
      - "lda/**"

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "tauri-ui/package-lock.json"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: tauri-ui
        run: npm ci

      - name: Build Windows NSIS bundle
        working-directory: tauri-ui
        run: npm run build -- --bundles nsis

      - name: Verify bundled resources
        shell: pwsh
        run: |
          $releaseDir = Join-Path $env:GITHUB_WORKSPACE "tauri-ui/src-tauri/target/release"
          $exePath = Join-Path $releaseDir "iramuteq-lite-tauri.exe"
          $expectedDirs = @("backend", "dictionnaires", "help", "images", "iramuteqlite", "lda")
          $manifest = @()

          if (-not (Test-Path $exePath)) {
            throw "Executable not found: $exePath"
          }

          $manifest += "Executable: $exePath"

          foreach ($dirName in $expectedDirs) {
            $dirPath = Join-Path $releaseDir $dirName
            if (-not (Test-Path $dirPath)) {
              throw "Bundled resource directory not found: $dirPath"
            }

            $fileCount = (Get-ChildItem -Path $dirPath -Recurse -File | Measure-Object).Count
            $manifest += "$dirName : $fileCount files"
          }

          $manifestPath = Join-Path $releaseDir "bundle-layout.txt"
          $manifest | Set-Content -Path $manifestPath -Encoding UTF8

      - name: Assemble portable Windows bundle
        shell: pwsh
        run: |
          $releaseDir = Join-Path $env:GITHUB_WORKSPACE "tauri-ui/src-tauri/target/release"
          $portableDir = Join-Path $releaseDir "bundle/windows-portable"
          $expectedDirs = @("backend", "dictionnaires", "help", "images", "iramuteqlite", "lda")

          if (Test-Path $portableDir) {
            Remove-Item -Path $portableDir -Recurse -Force
          }

          New-Item -ItemType Directory -Path $portableDir | Out-Null
          Copy-Item -Path (Join-Path $releaseDir "iramuteq-lite-tauri.exe") -Destination $portableDir
          Copy-Item -Path (Join-Path $releaseDir "bundle-layout.txt") -Destination $portableDir

          foreach ($dirName in $expectedDirs) {
            Copy-Item -Path (Join-Path $releaseDir $dirName) -Destination (Join-Path $portableDir $dirName) -Recurse
          }

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: iramuteq-lite-windows-nsis
          path: |
            tauri-ui/src-tauri/target/release/bundle/nsis/*.exe
            tauri-ui/src-tauri/target/release/bundle/nsis/*.msi
          if-no-files-found: error
          retention-days: 14

      - name: Upload Windows portable bundle
        uses: actions/upload-artifact@v4
        with:
          name: iramuteq-lite-windows-portable
          path: tauri-ui/src-tauri/target/release/bundle/windows-portable
          if-no-files-found: error
          retention-days: 14
